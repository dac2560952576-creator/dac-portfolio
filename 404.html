<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Redirect GitHub Pages 404 to SPA index, preserving the path
    const path = sessionStorage.getItem('redirect') || location.pathname;
    sessionStorage.setItem('redirect', path);
    const base = location.pathname.substring(0, location.pathname.indexOf('/', 1));
    location.replace(base || '/');
  </script>
</head>
<body></body>
</html>
